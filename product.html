<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="container">

    <div class="logo">ShopNow!</div>

    <nav class="nav-bar">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="index.html#products">Products</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>

    <div class="sch-bar">
      <input type="text" placeholder="Search products...">
      <button type="button">Search</button>
    </div>

    <div class="cart">
      🛒 <span class="cart-count">0</span>
    </div>

    <div class="hamburger">☰</div>

  </div>
</header>

<!-- PRODUCT DETAIL -->
<section class="product-detail">
  <div class="container detail-container">

    <!-- LEFT: IMAGE -->
    <div class="product-gallery">
      <div class="zoom-container">
        <img id="productImage" class="main-img" src="" alt="Product Image">
      </div>

      <div class="thumbnails">
        <img src="" class="thumb active">
        <img src="" class="thumb">
        <img src="" class="thumb">
      </div>
    </div>

    <!-- RIGHT: INFO -->
    <div class="product-info">
      <h2 id="productTitle">Loading...</h2>

      <p class="price" id="productPrice"></p>

      <p class="rating">⭐ 4.5 / 5</p>

      <p class="desc" id="productDesc"></p>

      <!-- VARIATIONS -->
      <div class="variations">

        <!-- SIZE -->
        <div class="variation-group">
          <label>Size:</label>
          <div class="options" id="sizeOptions">
            <button type="button" class="option active">S</button>
            <button type="button" class="option">M</button>
            <button type="button" class="option">L</button>
            <button type="button" class="option disabled">XL</button>
          </div>
        </div>

        <!-- COLOR -->
        <div class="variation-group">
          <label>Color:</label>
          <div class="options" id="colorOptions">
            <button type="button" class="option active">Black</button>
            <button type="button" class="option">Blue</button>
            <button type="button" class="option disabled">Red</button>
          </div>
        </div>

      </div>

      <!-- QUANTITY -->
      <div class="quantity-section">
        <label>Quantity:</label>

        <div class="quantity-control">
          <button type="button" id="decrease">−</button>
          <span id="quantity">1</span>
          <button type="button" id="increase">+</button>
        </div>
      </div>

      <!-- TOTAL -->
      <p class="total-price">
        Total: <span id="totalPrice">$0</span>
      </p>

      <!-- CTA -->
      <button type="button" class="add-cart">Add to Cart</button>
    </div>

  </div>
</section>

<!-- TOAST -->
<div id="toast" class="toast">Added to cart ✅</div>

<!-- FOOTER -->
<footer class="footer">
  <p>© 2026 ShopNow. All rights reserved.</p>
</footer>

<script src="scripts/product.js"></script>
</body>
</html>
